[task_config]
includes = ["tasks"]

[settings]
# paranoid = true
env_file = ".env"
experimental = true
idiomatic_version_file_enable_tools = ["node"]
npm.bun = true
node.compile = false
node.gpg_verify = true
pipx.uvx = true
python.uv_venv_auto = true
python.uv_venv_create_args = ["--seed"]
terminal_progress = false
lockfile = true

[bootstrap.repos]
# Oh My Zsh theme: fast, feature-rich prompt with instant prompt support.
"~/.config/oh-my-zsh/custom/themes/powerlevel10k" = { url = "https://github.com/romkatv/powerlevel10k.git" }
# Syntax highlighting while typing commands.
"~/.config/oh-my-zsh/custom/plugins/fast-syntax-highlighting" = { url = "https://github.com/zdharma-continuum/fast-syntax-highlighting.git" }
# Fish-like command history suggestions.
"~/.config/oh-my-zsh/custom/plugins/zsh-autosuggestions" = { url = "https://github.com/zsh-users/zsh-autosuggestions.git" }
# FZF-powered completion menu for tab completion.
"~/.config/oh-my-zsh/custom/plugins/fzf-tab" = { url = "https://github.com/Aloxaf/fzf-tab.git" }
# Extra completion sources and integrations for fzf-tab.
"~/.config/oh-my-zsh/custom/plugins/fzf-tab-source" = { url = "https://github.com/Freed-Wu/fzf-tab-source.git" }
# Vim-style editing mode for Zsh with rich motion/text-object behavior.
"~/.config/oh-my-zsh/custom/plugins/zsh-vi-mode" = { url = "https://github.com/jeffreytse/zsh-vi-mode.git" }
# Updates Oh My Zsh custom plugins/themes during normal update flow.
"~/.config/oh-my-zsh/custom/plugins/ohmyzsh-full-autoupdate" = { url = "https://github.com/Pilaton/OhMyZsh-full-autoupdate.git" }
# Personal LazyVim fork used for local plugin development.
"~/dev/personal/nvim-plugins/LazyVim" = { url = "git@github.com:minusfive/LazyVim.git", ref = "minusfive" }

[tools]
rust = "nightly"
cargo-binstall = "latest"
node = { version = "25", postinstall = "mise run global-install-packages-npm" }
python = { version = "3.13", postinstall = "mise run global-install-packages-python" }
ruby = { version = "latest", postinstall = "mise run global-install-packages-ruby" }

bun = "latest"
go = "latest"
uv = "latest"
delta = "latest"
stylua = "latest"
prettier = "latest"
tree-sitter = "latest"
markdownlint-cli2 = "latest"

"npm:@mermaid-js/mermaid-cli" = { version = "latest", install_env = { PUPPETEER_SKIP_DOWNLOAD = "1" } }
"npm:mcp-hub" = "latest"
"npm:@github/copilot" = "latest"
"npm:@tobilu/qmd" = "latest"
opencode = "latest"
